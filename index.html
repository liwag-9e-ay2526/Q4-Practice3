<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Level Selector</title>

    <link rel="stylesheet" href="styles.css">

</head>
<body>

    <div class="container"> 
        <h2>Game Level</h2>

        <label>Enter level (1-3):</label><br>
        <input type="number" id="lev"><br><br>

        <p id="mode"></p>

        <button onclick="conflev()">Confirm level</button>
        <button onclick="window.location.reload()">Refresh</button>
    </div>

    <script src="main.js"></script>

</body>
</html>
